<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F0E0C"/>
      <stop offset="100%" stop-color="#0B0B0B"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8C76A"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="v-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>

  <!-- Subtle texture lines -->
  <line x1="0" y1="629" x2="1200" y2="629" stroke="#1A1A1A" stroke-width="1"/>
  <line x1="0" y1="1" x2="1200" y2="1" stroke="#1A1A1A" stroke-width="1"/>

  <!-- Large V monogram (decorative, right side) -->
  <path d="M700 30 L810 30 L1010 600 L1210 30 L1320 30 L1080 625 L940 625 Z" fill="url(#v-grad)"/>

  <!-- Left gold accent bar -->
  <rect x="0" y="0" width="7" height="630" fill="url(#gold-grad)"/>

  <!-- Gold horizontal rule above brand name -->
  <rect x="72" y="175" width="80" height="1.5" fill="#C9A84C" opacity="0.7"/>

  <!-- VERO — primary brand name -->
  <text
    x="72" y="290"
    font-family="Georgia, 'Book Antiqua', Palatino, 'Times New Roman', serif"
    font-size="108" font-weight="700" letter-spacing="14"
    fill="#F0EDE8">VERO</text>

  <!-- NARGUILE — gold accent name -->
  <text
    x="74" y="390"
    font-family="Georgia, 'Book Antiqua', Palatino, 'Times New Roman', serif"
    font-size="108" font-weight="700" letter-spacing="8"
    fill="url(#gold-grad)">NARGUILE</text>

  <!-- Category label -->
  <text
    x="73" y="444"
    font-family="'Arial', 'Helvetica Neue', Helvetica, sans-serif"
    font-size="22" letter-spacing="6" font-weight="400"
    fill="#6A6460">TABACARIA · SÃO PAULO</text>

  <!-- Thin divider -->
  <rect x="72" y="472" width="520" height="1" fill="#252525"/>

  <!-- Tagline -->
  <text
    x="72" y="518"
    font-family="'Arial', 'Helvetica Neue', Helvetica, sans-serif"
    font-size="24" fill="#7A7470" font-weight="300">
    Narguile, essências e acessórios.
  </text>
  <text
    x="72" y="550"
    font-family="'Arial', 'Helvetica Neue', Helvetica, sans-serif"
    font-size="24" fill="#7A7470" font-weight="300">
    Pedido pelo WhatsApp, simples assim.
  </text>

  <!-- Bottom domain hint -->
  <text
    x="72" y="600"
    font-family="'Arial', 'Helvetica Neue', Helvetica, sans-serif"
    font-size="18" fill="#3A3430" letter-spacing="2">
    veronarguile.com.br
  </text>
</svg>
